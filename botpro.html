<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحكم في بوت الذهب 🤖</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0e1a; color: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #b8860b; }
        h1, h2 { color: #ffd700; text-align: center; }
        input { background: #0a0a0a; color: #00ccff; border: 1px solid #333; padding: 10px; border-radius: 5px; width: calc(100% - 24px); margin-bottom: 10px; }
        button { background: #b8860b; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #ffd700; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        th { color: #ffd700; }
        .ticket-input { width: 80px; margin: 0; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 لوحة التحكم في البوت</h1>

    <div class="card">
        <h2>الإعدادات (Settings)</h2>
        <input type="text" id="github_token" placeholder="GitHub Personal Access Token (PAT)" type="password">
        <input type="text" id="github_user" placeholder="اسم المستخدم في GitHub (Username)">
        <input type="text" id="github_repo" placeholder="اسم المستودع (Repository Name)">
        <button onclick="loadPositions()">🔄 تحديث الصفقات المفتوحة</button>
    </div>

    <div class="card">
        <h2>الأهداف العامة ($)</h2>
        <label style="color: #00ff88;">هدف الشراء (Target Buy):</label>
        <input type="number" id="global_buy" value="5.0" step="0.5">
        <label style="color: #ff1744;">هدف البيع (Target Sell):</label>
        <input type="number" id="global_sell" value="5.0" step="0.5">
    </div>

    <div class="card">
        <h2>التقارير والصفقات المفتوحة 📊</h2>
        <table>
            <thead>
                <tr>
                    <th>رقم الصفقة (Ticket)</th>
                    <th>النوع</th>
                    <th>الربح الحالي</th>
                    <th>الهدف المخصص ($)</th>
                </tr>
            </thead>
            <tbody id="positions_table">
                <tr><td colspan="4">كليكي على "تحديث" باش تقرا الصفقات...</td></tr>
            </tbody>
        </table>
        <br>
        <button onclick="sendRemoteCommand()" style="background: #00e676;">🚀 إرسال الأوامر للبوت</button>
    </div>
</div>

<script>
    // 1. دالة لقراءة الصفقات المفتوحة من GitHub
    async function loadPositions() {
        const user = document.getElementById('github_user').value;
        const repo = document.getElementById('github_repo').value;
        const token = document.getElementById('github_token').value;

        if(!user || !repo || !token) {
            alert("عافاك دخل معلومات GitHub كاملة (Token, User, Repo)");
            return;
        }

        // كنفترضو أن البوت ديالك كيصيفط الصفقات لملف سميتو open_positions.json
        const url = `https://raw.githubusercontent.com/${user}/${repo}/main/open_positions.json`;
        
        try {
            let response = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!response.ok) throw new Error("مالقيتش الملف، تأكد من المعلومات ولا راه البوت باقي ماصيفط والو.");
            
            let data = await response.json();
            let tbody = document.getElementById('positions_table');
            tbody.innerHTML = ''; // تفريغ الجدول القديم

            data.positions.forEach(pos => {
                let typeColor = pos.type === "BUY" ? "#00ff88" : "#ff1744";
                let profitColor = pos.profit > 0 ? "#00ff88" : "#ff1744";
                
                tbody.innerHTML += `
                    <tr>
                        <td>${pos.ticket}</td>
                        <td style="color: ${typeColor}; font-weight: bold;">${pos.type}</td>
                        <td style="color: ${profitColor};">${pos.profit} $</td>
                        <td>
                            <input type="number" class="ticket-input custom-target" data-ticket="${pos.ticket}" placeholder="الهدف...">
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            alert(error.message);
        }
    }

    // 2. دالة لإرسال التحديثات (Commit) لملف remote_control.json
    async function sendRemoteCommand() {
        const user = document.getElementById('github_user').value;
        const repo = document.getElementById('github_repo').value;
        const token = document.getElementById('github_token').value;

        if(!user || !repo || !token) {
            alert("دخل معلومات GitHub!");
            return;
        }

        // جمع الأهداف المخصصة من الجدول
        let customTargets = {};
        document.querySelectorAll('.custom-target').forEach(input => {
            if (input.value && input.value !== "") {
                let ticket = input.getAttribute('data-ticket');
                customTargets[ticket] = parseFloat(input.value);
            }
        });

        // تحضير الـ JSON اللي غيمشي للبوت
        let newCommand = {
            command_id: Date.now(), // رقم فريد باش البوت يعرف بلي أمر جديد
            action: "UPDATE_CUSTOM_TARGETS",
            global_target_buy: parseFloat(document.getElementById('global_buy').value),
            global_target_sell: parseFloat(document.getElementById('global_sell').value),
            custom_targets: customTargets
        };

        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/remote_control.json`;

        try {
            // أ - خاصنا نجيبو الـ SHA ديال الملف القديم باش نقدرو نبدلوه
            let getResponse = await fetch(apiUrl, { headers: { "Authorization": `token ${token}` } });
            let sha = "";
            if (getResponse.ok) {
                let currentFile = await getResponse.json();
                sha = currentFile.sha;
            }

            // ب - تحويل الـ JSON لـ Base64 باش يقبلو GitHub
            // btoa() بوحدها كدير مشاكل مع الحروف العربية، هاد الطريقة أحسن:
            let contentString = JSON.stringify(newCommand, null, 2);
            let base64Content = btoa(unescape(encodeURIComponent(contentString)));

            // ج - إرسال الملف الجديد
            let putResponse = await fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update targets from Web Dashboard 🚀",
                    content: base64Content,
                    sha: sha // يلا كان الملف جديد، غتكون خاوية
                })
            });

            if (putResponse.ok) {
                alert("✅ تم إرسال الأوامر للبوت بنجاح!");
            } else {
                throw new Error("فشل في إرسال الأوامر.");
            }
        } catch (error) {
            alert("❌ وقع مشكل: " + error.message);
        }
    }
</script>

</body>
</html>
